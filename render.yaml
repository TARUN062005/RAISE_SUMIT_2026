services:
  - type: web
    name: aura-clinical-agent-backend
    runtime: python
    pythonVersion: "3.12.7"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
